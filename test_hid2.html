<!DOCTYPE html>
<html>
<body>
<h1>Test HID 2</h1>
<div id="out"></div>
<script>
    async function test() {
        try {
            const res = await fetch('https://127.0.0.1:52181/get_connection');
            const data = await res.json();
            document.getElementById('out').innerText = "SUCCESS: API \n";
            
            const url = data.endpoint.replace('https://', 'wss://');
            const ws = new WebSocket(url);
            ws.onopen = () => {
                ws.send(JSON.stringify({ Path: '/dp/client/registrar', Data: { ClientVersion: '1.0', ProtocolVersion: '1.0' } }));
                setTimeout(() => ws.send(JSON.stringify({ Path: 'enumerate' })), 50);
                setTimeout(() => ws.send(JSON.stringify({ Path: '/dp/fp/enumerate' })), 100);
                setTimeout(() => ws.send(JSON.stringify({ Path: '/dp/fp/devices' })), 150);
            }
            ws.onmessage = (e) => {
                document.getElementById('out').innerText += "\nRCV: " + e.data;
            }
        } catch(e) {
            document.getElementById('out').innerText = "ERROR: " + e;
        }
    }
    test();
</script>
</body>
</html>
