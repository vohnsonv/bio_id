<!DOCTYPE html>
<html>
<body>
<h1>Test HID</h1>
<div id="out"></div>
<script>
    async function test() {
        try {
            const res = await fetch('https://127.0.0.1:52181/get_connection');
            const data = await res.json();
            document.getElementById('out').innerText = "SUCCESS: " + JSON.stringify(data);
            
            const url = data.endpoint.replace('https://', 'wss://');
            const ws = new WebSocket(url);
            ws.onopen = () => {
                document.getElementById('out').innerText += "\nWS OPENED!";
                ws.send(JSON.stringify({ Path: '/dp/client/registrar', Data: { ClientVersion: '1.0', ProtocolVersion: '1.0' } }));
            }
            ws.onmessage = (e) => {
                document.getElementById('out').innerText += "\nWS MSG: " + e.data;
                ws.close();
            }
            ws.onerror = (e) => {
                document.getElementById('out').innerText += "\nWS ERROR!";
            }
        } catch(e) {
            document.getElementById('out').innerText = "ERROR: " + e;
        }
    }
    test();
</script>
</body>
</html>
