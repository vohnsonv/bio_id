<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>LabSync | BioID</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0d0f12;
            --surface:  #141720;
            --surface2: #1c2030;
            --border:   #252a3a;
            --accent:   #4fffb0;
            --accent2:  #7b8cde;
            --warn:     #ff6b6b;
            --text:     #e8eaf0;
            --dim:      #6b7280;
            --mid:      #9ca3af;
            --r:        12px;
            --mono:     'DM Mono', monospace;
            --sans:     'Syne', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { width: 580px; height: 680px; margin: 0; padding: 0; overflow: hidden; }
        body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.1rem; font-weight: 800; }
        .logo-icon { width: 34px; height: 34px; border-radius: 10px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .status-pill { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-family: var(--mono); font-size: 0.7rem; color: var(--mid); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warn); }
        .dot.on { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 10px; }
        .tab { padding: 14px 20px; font-size: 0.75rem; font-family: var(--mono); color: var(--dim); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; text-transform: uppercase; letter-spacing: 1px; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        main { flex: 1; position: relative; overflow: hidden; }
        .panel { position: absolute; inset: 0; display: none; flex-direction: column; padding: 24px; overflow-y: auto; }
        .panel.active { display: flex; }

        /* VIEW STATES */
        .view-state { display: none; flex-direction: column; gap: 20px; flex: 1; min-height: 0; }
        .view-state.active { display: flex; }

        /* BIOMETRIA SPECIFIC */
        .reader-box { 
            flex: 1; background: var(--surface); border: 2px dashed var(--border); 
            border-radius: var(--r); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 30px; min-height: 200px;
        }
        .scanner-icon { font-size: 4rem; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-family: var(--mono); font-size: 0.65rem; color: var(--dim); text-transform: uppercase; }
        input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 14px; font-family: var(--sans); font-size: 0.9rem; outline: none; }
        
        .btn { padding: 12px 18px; border-radius: 8px; border: none; cursor: pointer; font-family: var(--sans); font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .btn-accent { background: var(--accent); color: #0d0f12; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--mid); }
        .btn-small { padding: 6px 12px; font-size: 0.7rem; }

        .table-wrap { flex: 1; border: 1px solid var(--border); border-radius: var(--r); overflow-y: auto; background: var(--surface); margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: var(--surface2); padding: 12px 16px; text-align: left; font-size: 0.6rem; font-family: var(--mono); color: var(--dim); text-transform: uppercase; }
        td { padding: 12px 16px; font-size: 0.85rem; border-bottom: 1px solid var(--border); }

        #logConsole { background: #050608; border: 1px solid #1c2030; font-family: var(--mono); font-size: 0.65rem; color: var(--accent); padding: 15px; border-radius: 8px; flex: 1; overflow-y: auto; white-space: pre-wrap; }

        /* TOAST */
        #toasts { position: fixed; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 999; }
        .toast { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 10px 16px; font-size: 0.78rem; font-family: var(--mono); display: flex; align-items: center; gap: 8px; box-shadow: 0 6px 20px rgba(0,0,0,.45); border-left: 3px solid var(--accent); }
        .toast.e { border-left-color: var(--warn); }
        .toast.i { border-left-color: var(--accent2); }
    </style>
</head>
<body>

<header>
    <div class="logo"><div class="logo-icon">🧬</div> LabSync | BioID</div>
    <div class="status-pill"><div class="dot" id="dot"></div> <span id="statusLabel">DESCONECTADO</span></div>
</header>

<nav>
    <div class="tab active" data-tab="pBiometria">Biometria</div>
    <div class="tab" data-tab="pWorkLab">WorkLab</div>
    <div class="tab" data-tab="pPonto">Ponto</div>
    <div class="tab" data-tab="pLogs">Terminal</div>
</nav>

<main>
    <!-- PANEL: BIOMETRIA -->
    <div class="panel active" id="pBiometria">
        <div id="bioSearch" class="view-state active">
            <h2 style="text-align: center; font-size: 1.1rem; margin-bottom: 10px;">Consulta Automática</h2>
            <div class="reader-box" id="searchBox">
                <div class="scanner-icon">👆</div>
                <div id="rMsgSearch" style="font-family: var(--mono); font-size: 0.8rem; color: var(--accent); text-align: center;">
                    AGUARDANDO DIGITAL...
                </div>
            </div>
            <div id="foundUser" style="display:none; padding: 20px; background: var(--surface2); border-radius: var(--r); border: 1px solid var(--accent);"></div>
        </div>

        <div id="bioRegister" class="view-state">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-size: 1rem; color: var(--warn);">Digital não Reconhecida</h2>
                <button class="btn btn-ghost btn-small" id="btnBackSearch">← VOLTAR</button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px;">
                <div class="field"><label>Nome Completo</label><input id="iNome" type="text" placeholder="Ex: Maria Souza"></div>
                <div class="field"><label>CPF</label><input id="iCpf" type="text" placeholder="000.000.000-00"></div>
                <div class="field"><label>ID WorkLab</label><input id="iId" type="text" placeholder="Automático"></div>
                <button class="btn btn-accent" id="btnSaveBio" style="margin-top: 10px;">SALVAR CADASTRO</button>
            </div>
        </div>
    </div>

    <!-- PANEL: WORKLAB -->
    <div class="panel" id="pWorkLab">
        <div id="wlAuth" class="view-state active" style="align-items: center; justify-content: center;">
            <div style="font-size: 3rem; margin-bottom: 20px;">🔑</div>
            <input id="wlPassInput" type="password" placeholder="Senha Administrativa" style="width: 280px; text-align: center;">
            <button class="btn btn-accent" id="wlBtnAuth" style="width: 280px; margin-top: 15px;">DESBLOQUEAR</button>
        </div>
        <div id="wlList" class="view-state">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-size: 1rem; color: var(--accent);">Gestão de Acessos</h2>
                <button class="btn btn-accent btn-small" id="btnWlNew">+ NOVO USUÁRIO</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>ID</th><th>NOME</th><th>USUÁRIO</th><th>CRACHÁ</th><th></th></tr></thead>
                    <tbody id="wlTbody"></tbody>
                </table>
            </div>
        </div>
        <div id="wlForm" class="view-state">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="btn btn-ghost btn-small" id="btnWlBack">← VOLTAR</button>
                <h2 id="wlFormTitle" style="font-size: 1rem;">Novo Usuário</h2>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                <div class="field"><label>ID Interno</label><input id="wlId" type="text"></div>
                <div class="field"><label>Nome Completo</label><input id="wlNome" type="text"></div>
                <div class="field"><label>Usuário WorkLab</label><input id="wlUser" type="text"></div>
                <div class="field"><label>Senha WorkLab</label><input id="wlPass" type="password"></div>
                <div class="field" style="grid-column: span 2;"><label>Número do Crachá (RFID)</label><input id="wlBadge" type="text"></div>
            </div>
            <button class="btn btn-accent" id="wlBtnSave" style="margin-top: 20px; width: 100%;">SALVAR ALTERAÇÕES</button>
        </div>
    </div>

    <!-- PANEL: PONTO -->
    <div class="panel" id="pPonto">
        <h2 style="font-size: 1rem; margin-bottom: 15px;">Monitor de Ponto (RFID)</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="field"><label>Status Escuta</label><input id="pStatusEscuta" readonly value="Inativo"></div>
            <div class="field"><label>Última Leitura</label><input id="pUltimaLeitura" readonly value="-"></div>
            <div class="field" style="grid-column: span 2;"><label>Último Cartão (UID)</label><input id="pUltimoCartao" readonly value="-"></div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn btn-accent" id="btnStartListen" style="flex: 1;">INICIAR ESCUTA</button>
            <button class="btn btn-ghost" id="btnStopListen" style="flex: 1;">PARAR</button>
        </div>
        <div id="pontoLog" style="margin-top: 20px; font-family: var(--mono); font-size: 0.7rem; color: var(--mid); background: var(--surface); padding: 10px; border-radius: 8px; flex: 1; overflow-y: auto;">
            Aguardando início...
        </div>
    </div>

    <!-- PANEL: TERMINAL -->
    <div class="panel" id="pLogs">
        <div id="logConsole">Conectando ao agente biométrico...</div>
    </div>
</main>

<div id="toasts"></div>
<script src="database.js"></script>
<script src="popup.js"></script>
</body>
</html>
